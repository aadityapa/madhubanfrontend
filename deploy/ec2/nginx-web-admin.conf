# Example: serve web-admin static build on EC2 with nginx.
# 1) Copy built files: apps/web-admin/dist/* → /var/www/madhuban360-admin/
# 2) Change 127.0.0.1:3000 if your API listens elsewhere.
# 3) Symlink into /etc/nginx/sites-enabled/ or paste the server block into your config.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/madhuban360-admin;
    index index.html;

    # SPA: always load index.html so /login and deep links work after refresh
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin API (empty VITE_API_BASE_URL at build → browser calls /api/... on this host)
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api {
        return 301 /api/;
    }
}
