# Same-host pattern: API proxied from this server to a local Node process.
# If your API is only on https://nexyyra.com, use nginx-web-admin-external-api.conf instead
# and build with VITE_API_BASE_URL=https://nexyyra.com (no /api proxy needed here).
#
# 1) sudo ./deploy/ec2/publish-web-admin.sh
# 2) Adjust proxy_pass below if the API is not on 127.0.0.1:3000
# 3) sudo cp deploy/ec2/nginx-web-admin.conf /etc/nginx/conf.d/madhuban360-admin.conf
# 4) sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/madhuban360-admin;
    index index.html;

    # SPA: always load index.html so /login and deep links work after refresh
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin API (empty VITE_API_BASE_URL at build → browser calls /api/... on this host)
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api {
        return 301 /api/;
    }
}
