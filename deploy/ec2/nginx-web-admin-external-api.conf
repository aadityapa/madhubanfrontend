# Serve web-admin static files when the API is on another host (e.g. https://nexyyra.com).
# Build with VITE_API_BASE_URL=https://nexyyra.com so the browser calls that origin directly.
#
# 1) sudo rsync -a --delete apps/web-admin/dist/ /var/www/madhuban360-admin/
# 2) sudo cp deploy/ec2/nginx-web-admin-external-api.conf /etc/nginx/conf.d/madhuban360-admin.conf
# 3) Replace server_name _; with your domain or EC2 public DNS.
# 4) sudo nginx -t && sudo systemctl reload nginx
# 5) Open port 80 (and 443 after certbot) in the EC2 security group.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/madhuban360-admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
