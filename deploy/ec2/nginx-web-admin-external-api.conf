# Static admin UI on EC2 + API on another host (https://nexyyra.com).
#
# If the app was built WITHOUT VITE_API_BASE_URL, the browser POSTs to /api/... on THIS host.
# Without the block below, nginx only has try_files for / and returns 405 for POST /api/....
#
# This proxies /api/* to your real backend (change the host if needed).
#
# 1) sudo ./deploy/ec2/publish-web-admin.sh
# 2) sudo cp deploy/ec2/nginx-web-admin-external-api.conf /etc/nginx/conf.d/madhuban360-admin.conf
# 3) sudo nginx -t && sudo systemctl reload nginx
#
# Alternative: rebuild with VITE_API_BASE_URL=https://nexyyra.com (browser calls API directly;
# then your backend must allow this admin origin in CORS).

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/madhuban360-admin;
    index index.html;

    location /api/ {
        proxy_pass https://nexyyra.com/api/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host nexyyra.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /api {
        return 301 /api/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
